<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="style.css"/>
    
    <link rel="icon" type="image/png" href="favicon_io/favicon-16x16.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="favicon_io/favicon-32x32.png" sizes="16x16" />    

    <title>AP Stats Survey</title>
</head>
<body>
    <div class="title">
        <h1>AP Statistics Project</h1>
        <h4><b>(MAKE SURE VOLUME IS NOT 0)</b></h4>
    </div>

    <main>
        <video id="video" controls></video>

        <form enctype="text/plain" id="form">
            <div>
                <input type="radio" id="A" value="A">
                <label for="A">A</label>
            </div>
            <div>
                <input type="radio" id="B" value="B">
                <label for="B">B</label>
            </div>
            <button id="submit" type="submit">Submit</button>
        </form>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
